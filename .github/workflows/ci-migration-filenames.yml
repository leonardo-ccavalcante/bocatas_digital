name: Migration Filename Lint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/ci-migration-filenames.yml"

jobs:
  lint:
    name: Enforce migration filename pattern
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate filenames
        run: |
          set -euo pipefail

          # Allowed:
          #   1. Canonical Supabase pattern: 14-digit timestamp + underscore + name.sql
          #      e.g. 20260506000001_drop_dead_tables.sql
          #   2. Re-exported from prod (Phase 1.6): <14-digit version>_<original_name>.sql
          #      lives under supabase/migrations/EXPORTED/ — same regex applies.
          #   3. README.md inside EXPORTED/ — explanatory only.
          #
          # Rejected:
          #   - 20260505_xxx.sql (8-digit timestamp; missing time portion)
          #   - any non-SQL file at the migrations root

          allowed_pattern='^[0-9]{14}_[a-z0-9_]+\.sql$'
          fail=0

          while IFS= read -r path; do
            file=$(basename "$path")
            dir=$(dirname "$path")

            # README.md inside EXPORTED/ is allowed
            if [[ "$file" == "README.md" && "$dir" == *"/EXPORTED" ]]; then
              continue
            fi

            if [[ ! "$file" =~ $allowed_pattern ]]; then
              echo "::error file=$path::Migration filename '$file' does not match required pattern: ^[0-9]{14}_[a-z0-9_]+\.sql$"
              fail=1
            fi
          done < <(find supabase/migrations -type f -name "*.sql" -o -type f -name "*.md" | sort)

          if [[ "$fail" -eq 1 ]]; then
            echo ""
            echo "Naming convention: <YYYYMMDDhhmmss>_<snake_case_description>.sql"
            echo "Example: 20260506120000_add_index_on_persons_email.sql"
            exit 1
          fi

          echo "All migration filenames match the required pattern. ✓"

      - name: Verify migration versions are unique
        run: |
          set -euo pipefail

          # Two parallel PRs can each add a migration with the same 14-digit
          # version on the same day; schema_migrations' PK is the version, so
          # the collision only explodes later, mid-`db reset`, in the PR's
          # merge preview (seen in #130 vs #125). Fail fast here instead.
          # Root migrations only — EXPORTED/ legitimately mirrors versions.
          dupes=$(find supabase/migrations -maxdepth 1 -type f -name "*.sql" \
            | xargs -n1 basename | cut -d'_' -f1 | sort | uniq -d || true)

          if [ -n "${dupes:-}" ]; then
            echo "::error::Duplicate migration version prefix(es): ${dupes}"
            echo "Each migration needs a unique 14-digit version — renumber the"
            echo "ones from YOUR branch (never files already merged to main)."
            find supabase/migrations -maxdepth 1 -type f -name "*.sql" | sort
            exit 1
          fi

          echo "All migration versions are unique. ✓"
