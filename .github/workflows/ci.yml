name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        # No `version` input here — pnpm/action-setup@v4 errors when both
        # `version` and `package.json#packageManager` are set. The pinned
        # version (with SHA) lives in package.json; that's the single
        # source of truth for both CI and local dev. (Phase 6.b CI fix.)
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx eslint client/src/features client/src/store client/src/pages client/src/components/layout server --ext .ts,.tsx

      - name: TypeScript check
        run: pnpm check

      - name: Run tests with coverage
        # Unit tests are blocking. Placeholder Supabase values cover code paths
        # that only need env presence; live DB integration tests must self-skip
        # when they require real credentials.
        run: pnpm vitest run --coverage --coverage.reportOnFailure=true
        env:
          # Placeholder values keep env-only imports from throwing at suite load.
          # Real prod credentials should NOT be exposed to coverage runs.
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: ph_only
          VITE_SUPABASE_URL: http://localhost
          VITE_SUPABASE_ANON_KEY: ph.ph.ph

      - name: Coverage gate (verified-baseline thresholds — see vitest.config.ts)
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::error::coverage-summary.json missing — coverage gate failed to run"
            exit 1
          fi
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const limits = { lines: 25, branches: 70, functions: 40, statements: 25 };
            const fail = Object.entries(limits).filter(([k, min]) => s[k].pct < min);
            if (fail.length) {
              console.error('Coverage REGRESSED below baseline on:', fail.map(([k, min]) => k + '=' + s[k].pct + '% (min ' + min + '%)').join(', '));
              process.exit(1);
            }
            console.log('Coverage gate passed:', Object.keys(limits).map(k => k + '=' + s[k].pct + '%').join(', '));
          "

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ID: ci-build
          VITE_OAUTH_PORTAL_URL: https://placeholder.manus.im

      - name: Generate ephemeral JWT secret for Lighthouse
        # The prod server fail-fasts at boot without a JWT_SECRET (env.ts), and
        # REFUSES any value from its known-dummy deny-list. A per-run random
        # secret satisfies both: never public, never reused, nothing to leak.
        run: echo "LHCI_JWT_SECRET=$(openssl rand -base64 48)" >> "$GITHUB_ENV"

      - name: Lighthouse CI (LCP ≤2.5s, JS bundle ≤300 KB, a11y ≥0.95)
        # GATE IS BLOCKING (ATL-02). Audits /login — the only page measurable
        # without a session — which pays the full entry+vendor payload, so it
        # catches every-page script/LCP regressions. Auth-route auditing
        # (/checkin, /dashboard) needs an LHCI puppeteer login script: tracked
        # as follow-up, do NOT re-add continue-on-error. That follow-up MUST
        # also switch upload away from temporary-public-storage first — public
        # LHCI reports of authed pages would publish beneficiary PII
        # screenshots.
        run: npx --yes @lhci/cli@0.13.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ID: ci-build
          VITE_OAUTH_PORTAL_URL: https://placeholder.manus.im
          JWT_SECRET: ${{ env.LHCI_JWT_SECRET }}
