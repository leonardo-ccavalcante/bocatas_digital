name: Supabase Advisors

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/ci-supabase-advisors.yml"

jobs:
  advisors:
    name: Security advisor gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Supabase advisors
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${SUPABASE_PROJECT_REF}" || -z "${SUPABASE_ACCESS_TOKEN}" ]]; then
            echo "::warning::SUPABASE_PROJECT_REF or SUPABASE_ACCESS_TOKEN secret missing — advisor gate skipped"
            exit 0
          fi

          response=$(curl --silent --fail --show-error \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/advisors/security")

          high=$(echo "${response}" | jq '[.lints[] | select(.level=="ERROR" or .level=="CRITICAL")] | length')
          warn=$(echo "${response}" | jq '[.lints[] | select(.level=="WARN")] | length')

          echo "ERROR/CRITICAL: ${high}"
          echo "WARN: ${warn}"

          if [[ "${high}" -gt 0 ]]; then
            echo "::error::Found ${high} ERROR/CRITICAL security advisor(s). Fix before merging."
            echo "${response}" | jq '.lints[] | select(.level=="ERROR" or .level=="CRITICAL")'
            exit 1
          fi

          if [[ "${warn}" -gt 2 ]]; then
            echo "::warning::Found ${warn} WARN advisors (baseline=2: pg_trgm in public + leaked-password). Review new ones:"
            echo "${response}" | jq '.lints[] | select(.level=="WARN") | {name, detail}'
          fi

          echo "Advisor gate passed."
