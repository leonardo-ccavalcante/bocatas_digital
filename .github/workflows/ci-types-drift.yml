name: Types Drift Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "supabase/migrations/**"
      - "client/src/lib/database.types.ts"
      - ".github/workflows/ci-types-drift.yml"

jobs:
  types-drift:
    name: database.types.ts vs supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (was `latest` — non-deterministic): a newer CLI regressed
          # `gen types --local` to require SUPABASE_ACCESS_TOKEN, failing this
          # gate on infra grounds rather than real drift. 2.106.0 is verified to
          # gen types from a local stack without a token. (Mythos: DIO/types gate.)
          version: 2.106.0

      # The supabase/migrations/EXPORTED/ subdirectory holds the foundational
      # schema re-exported from production on 2026-05-05 (see
      # supabase/migrations/EXPORTED/README.md). `supabase start` applies
      # migrations non-recursively, so we copy EXPORTED files to the top
      # level here so they get applied first (their timestamps sort earlier).
      #
      # The top-level pre-snapshot migrations DO duplicate some objects from
      # EXPORTED — those have been made idempotent in-place via
      # IF NOT EXISTS / DROP ... IF EXISTS guards. See the per-file commits
      # that fixed each conflict. Net result: applying EXPORTED then
      # top-level on a fresh DB matches the production schema_migrations
      # history exactly, with no duplicate-creation errors.
      - name: Bootstrap foundational migrations from EXPORTED/
        run: |
          set -euo pipefail
          if [ ! -d supabase/migrations/EXPORTED ]; then
            echo "::warning::supabase/migrations/EXPORTED/ not found — skipping bootstrap"
            exit 0
          fi
          count=$(find supabase/migrations/EXPORTED -maxdepth 1 -name '*.sql' -type f | wc -l)
          echo "Copying ${count} foundational migrations from EXPORTED/ to top level"
          cp supabase/migrations/EXPORTED/*.sql supabase/migrations/

      - name: Start local Supabase
        run: supabase start

      - name: Generate types from local schema
        # Current supabase CLI (2.106.0) refuses `gen types` unless SOME access
        # token is PRESENT — even for a purely-local generation. It only checks
        # presence, not validity (verified: a dummy token + --db-url generates the
        # exact same types as a real session). So this failed in CI on infra
        # grounds ("Access token not provided"), never reaching the drift diff —
        # the gate has not actually verified drift since the CLI bumped past the
        # June-5 version. Generate from the local DB URL (no remote, no real
        # credential) with a dummy token to satisfy the presence check.
        env:
          # NOT a credential — a non-empty placeholder to clear the CLI's token
          # presence check. Generation is fully local (--db-url); no remote call.
          SUPABASE_ACCESS_TOKEN: ci-local-no-remote-call
        run: |
          DB_URL=$(supabase status -o env 2>/dev/null | grep '^DB_URL=' | cut -d= -f2- | tr -d '"' || true)
          : "${DB_URL:=postgresql://postgres:postgres@127.0.0.1:54322/postgres}"
          echo "Generating types from ${DB_URL%%:*}://<redacted>@${DB_URL##*@}"
          # --schema public explicitly: the committed file is public-only, and a
          # config-less CLI defaults to public anyway — be deterministic about it
          # (graphql_public is unused GraphQL-extension boilerplate).
          supabase gen types typescript --db-url "$DB_URL" --schema public > /tmp/types.ts

      - name: Diff against committed types
        run: |
          if ! diff -q /tmp/types.ts client/src/lib/database.types.ts; then
            echo "::error::client/src/lib/database.types.ts is stale vs current migrations."
            echo "Run locally: supabase gen types typescript --local > client/src/lib/database.types.ts"
            diff /tmp/types.ts client/src/lib/database.types.ts || true
            exit 1
          fi
          echo "Types match migrations. ✓"

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
